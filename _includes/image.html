<figure class="gallery">
  <div class="gallery-images">
    {% for image in include.images %}
      <img
        src="{{ image }}"
        width="{{ include.width }}"
        height="{{ include.height }}">
    {% endfor %}
  </div>

  {% if include.caption %}
    <figcaption align="right">{{ include.caption }}</figcaption>
  {% endif %}
</figure>
