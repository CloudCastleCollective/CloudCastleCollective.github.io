<figure class="gallery">
  <div class="gallery-images">
    {% for image in include.images %}
      <img
        src="{{ image.src }}"
        alt="{{ image.alt | default: '' }}"
        width="{{ image.width }}"
        height="{{ image.height }}">
    {% endfor %}
  </div>

  {% if include.caption %}
    <figcaption>{{ include.caption }}</figcaption>
  {% endif %}
</figure>
